<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>지우 포카</title>
    
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@400;500;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --primary: #007bff;
            --secondary: #ff4757;
            --bg: #f8f9fa;
            --card-shadow: 0 4px 12px rgba(0,0,0,0.08);
            --border: #edf2f7;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: 'Noto Sans KR', sans-serif; background-color: var(--bg); color: #2d3436; line-height: 1.6; }

        .container { max-width: 500px; margin: 0 auto; min-height: 100vh; background-color: #fff; position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.05); }
        
        .header { 
            display: flex; justify-content: space-between; align-items: center; 
            padding: 12px 20px; background-color: #fff; border-bottom: 1px solid var(--border);
            position: sticky; top: 0; z-index: 1000;
        }
        .logo { font-size: 20px; font-weight: 700; color: #1e272e; cursor: pointer; user-select: none; letter-spacing: -0.5px; }
        .icon-btn { background: none; border: none; cursor: pointer; color: #485460; font-size: 1.2rem; padding: 8px; transition: color 0.2s; }
        
        .toc-menu { 
            display: none; background-color: #fff; padding: 15px 20px; 
            position: absolute; top: 57px; left: 0; width: 100%; 
            height: calc(100vh - 57px); z-index: 2000; overflow-y: auto;
        }
        .menu-group { border-bottom: 1px solid var(--border); padding: 5px 0; }
        .menu-parent-row { display: flex; justify-content: space-between; align-items: center; padding: 12px 0; }
        .menu-parent-text { font-size: 1.05rem; font-weight: 700; color: #2d3436; cursor: pointer; flex: 1; }
        .toggle-btn { padding: 10px; cursor: pointer; color: #b2bec3; transition: 0.3s; }
        .toggle-btn.active { transform: rotate(180deg); color: var(--primary); }
        .menu-child-list { list-style: none; padding: 5px 0 15px 5px; display: none; flex-wrap: wrap; gap: 8px; }
        .menu-child-item { font-size: 0.8rem; color: #636e72; cursor: pointer; background: #f1f2f6; padding: 6px 14px; border-radius: 20px; transition: 0.2s; }

        .main-content { padding: 20px; min-height: 80vh; }
        
        .welcome { text-align: center; margin-top: 80px; animation: fadeIn 0.8s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .welcome p { color: #a4b0be; font-size: 0.95rem; }
        .bookmark-main-btn { 
            margin-top: 25px; padding: 12px 30px; border: none; 
            background: var(--secondary); color: #fff; border-radius: 50px; 
            font-weight: 700; cursor: pointer; box-shadow: 0 4px 15px rgba(255, 71, 87, 0.3);
            transition: 0.2s; font-size: 0.9rem;
        }

        .search-bar-container { display: none; margin-bottom: 20px; animation: fadeIn 0.4s; }
        .search-input-wrapper { position: relative; display: flex; align-items: center; }
        .search-input-wrapper i { position: absolute; left: 15px; color: #a4b0be; font-size: 0.9rem; }
        .search-input-wrapper input { 
            width: 100%; padding: 12px 12px 12px 40px; border: 1px solid var(--border); 
            border-radius: 12px; outline: none; font-size: 0.9rem; background: #f9f9f9; 
        }

        #result-area { display: none; animation: fadeIn 0.4s; }
        .album-title { font-size: 1.4rem; font-weight: 700; color: var(--primary); margin-bottom: 15px; letter-spacing: -0.5px; }
        .tab-container { display: flex; flex-wrap: wrap; gap: 6px; margin-bottom: 20px; }
        .tab-btn { 
            padding: 7px 14px; border: 1px solid var(--border); background: #fff; 
            border-radius: 8px; cursor: pointer; font-size: 0.75rem; font-weight: 500; color: #7f8c8d;
        }
        .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); box-shadow: 0 2px 8px rgba(0, 123, 255, 0.3); }
        
        .sub-filter-group { background: #f9f9f9; padding: 12px; border-radius: 12px; margin-bottom: 15px; border: 1px solid var(--border); }
        .filter-label { font-size: 0.75rem; color: #a4b0be; margin-bottom: 8px; font-weight: 700; }
        .filter-btns { display: flex; flex-wrap: wrap; gap: 6px; }
        .f-btn { flex: 1; min-width: 80px; padding: 7px; border-radius: 6px; border: 1px solid #ddd; background: #fff; font-size: 0.7rem; cursor: pointer; color: #636e72; }
        .f-btn.active { background: #2d3436; color: #fff; border-color: #2d3436; }

        .card-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 15px; margin-top: 10px; }
        .card-item { 
            background: #fff; border-radius: 12px; border: 1px solid var(--border); 
            padding: 8px; display: flex; flex-direction: column; position: relative; 
            box-shadow: var(--card-shadow);
        }
        
        .card-image-wrapper { 
            width: 100%; aspect-ratio: 5.5 / 8.5; border-radius: 8px; overflow: hidden; 
            background: #f1f2f6; position: relative;
        }
        .card-image-wrapper img { width: 100%; height: 100%; object-fit: cover; cursor: pointer; }
        
        .card-name { font-size: 0.85rem; font-weight: 700; color: #2d3436; margin: 10px 0 4px; text-align: center; }
        .card-bookmark-btn { 
            position: absolute; top: 12px; right: 12px; background: rgba(255,255,255,0.8); 
            border: none; cursor: pointer; font-size: 1.1rem; color: #dfe6e9; 
            z-index: 5; width: 32px; height: 32px; border-radius: 50%;
            display: flex; align-items: center; justify-content: center; backdrop-filter: blur(4px);
        }
        .card-bookmark-btn.active { color: var(--secondary); background: #fff; }
        
        #tab-label { font-size: 0.85rem; font-weight: 700; color: #b2bec3; margin-bottom: 12px; }

        .modal {
            display: none; position: fixed; z-index: 3000; top: 0; left: 0;
            width: 100%; height: 100%; background-color: rgba(0, 0, 0, 0.9);
            justify-content: center; align-items: center; cursor: zoom-out;
        }
        .modal-content {
            max-width: 90%; max-height: 80%; border-radius: 15px;
            animation: zoomIn 0.3s;
        }
        @keyframes zoomIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    </style>
</head>
<body>

<div class="container">
    <header class="header">
        <button id="menu-toggle" class="icon-btn"><i class="fas fa-bars"></i></button>
        <h1 class="logo" onclick="goHome()">지우 포카</h1>
        <button id="search-toggle" class="icon-btn"><i class="fas fa-search"></i></button>
    </header>

    <nav id="toc-menu" class="toc-menu">
        <div id="menu-list-container"></div>
    </nav>

    <main class="main-content" id="main-view">
        <div id="search-bar" class="search-bar-container">
            <div class="search-input-wrapper">
                <i class="fas fa-search"></i>
                <input type="text" id="search-input" placeholder="이름 또는 특징(안경, 볼콕 등) 검색...">
            </div>
        </div>

        <div id="welcome-view" class="welcome">
            <i class="fas fa-th-large" style="font-size:3.5rem; color:#f1f2f6; display:block; margin-bottom:20px;"></i>
            <p>메뉴를 선택해 포토카드를 확인하세요</p>
            <button class="bookmark-main-btn" onclick="showBookmarks()">
                <i class="fas fa-heart"></i> 내 북마크 보기
            </button>
        </div>

        <div id="result-area">
            <h2 id="display-album-name" class="album-title">Album Name</h2>
            <div id="tab-wrapper" class="tab-container"></div>
            
            <div id="version-filter" class="sub-filter-group" style="display:none;">
                <p class="filter-label">VERSION</p>
                <div id="version-btn-wrapper" class="filter-btns"></div>
            </div>

            <div id="fansign-filter" class="sub-filter-group" style="display:none;">
                <p class="filter-label">FANSIGN TYPE</p>
                <div id="fansign-btn-wrapper" class="filter-btns"></div>
            </div>

            <div id="tab-label">[전체] 목록</div>
            <div class="card-grid" id="pc-list"></div>
        </div>
    </main>
</div>

<div id="image-modal" class="modal" onclick="closeModal()">
    <img id="modal-img" class="modal-content">
</div>

{ id: '131', name: 'FOCUS 지우 ', album: 'FOCUS', category: '예판 특전', version: 'Package Ver.', imgUrl: '', info: '포커스, everline, 손, 잔머리, 깐머리' },





 ]; 

    let bookmarks = JSON.parse(localStorage.getItem('jiwoo_bookmarks')) || [];
    let currentAlbum = '';
    let currentTab = '';
    let currentVer = '전체';
    let currentFsType = '전체';

    const menuToggle = document.getElementById('menu-toggle');
    const tocMenu = document.getElementById('toc-menu');
    const mainView = document.getElementById('main-view');
    const menuListContainer = document.getElementById('menu-list-container');
    const pcList = document.getElementById('pc-list');
    const searchToggle = document.getElementById('search-toggle');
    const searchBar = document.getElementById('search-bar');
    const searchInput = document.getElementById('search-input');

    const menuStructure = [
        { name: '전체', children: [] },
        { name: 'The Chase', children: ['앨범 포카', '예판 특전', '럭키드로우', '팬싸 특전'] },
        { name: 'STYLE', children: ['팬싸 특전', '럭키드로우', '기타'] },
        { name: 'FOCUS', children: ['앨범 포카', '예판 특전', '럭키드로우', '팬싸 특전'] },
        { name: 'RUDE!', children: ['럭키드로우'] },
        { name: '유닛 포카', children: ['The Chase', 'STYLE', 'FOCUS', 'RUDE!', '기타'] },
        { name: 'MD 포카', children: ['The Chase', 'STYLE', 'FOCUS', '1st ANNIVERSARY', 'Four Heart Club', '티니핑', '시즌그리팅', 'Hearts2 House', 'BIRTHDAY'] },
        { name: '기타', children: ['메가 커피', 'SUPER STAR SM', 'SMT 25', 'BARENBLISS', '2aN', 'sarlett', 'TELECA 2025 KPOP ROOKIE', 'SM 30th', '응원봉', '국민은행', 'LILY BROWN'] }
    ];

    function goHome() {
        tocMenu.style.display = 'none';
        mainView.style.display = 'block';
        searchBar.style.display = 'none';
        document.getElementById('tab-wrapper').style.display = 'flex'; // 탭 복구
        menuToggle.querySelector('i').className = 'fas fa-bars';
        document.getElementById('welcome-view').style.display = 'block';
        document.getElementById('result-area').style.display = 'none';
    }

    function renderMenu() {
        menuListContainer.innerHTML = menuStructure.map((parent, index) => `
            <div class="menu-group">
                <div class="menu-parent-row">
                    <span class="menu-parent-text" onclick="selectAlbum('${parent.name}')">${parent.name}</span>
                    ${parent.children.length > 0 ? `<div class="toggle-btn" onclick="toggleSubMenu(this, ${index})"><i class="fas fa-chevron-down"></i></div>` : ''}
                </div>
                ${parent.children.length > 0 ? `<ul class="menu-child-list" id="submenu-${index}" style="display:none;">${parent.children.map(child => `<li class="menu-child-item" onclick="selectFromMenu('${parent.name}', '${child}')">${child}</li>`).join('')}</ul>` : ''}
            </div>
        `).join('');
    }

    function toggleSubMenu(btn, index) {
        const submenu = document.getElementById(`submenu-${index}`);
        const isVisible = submenu.style.display === 'flex';
        submenu.style.display = isVisible ? 'none' : 'flex';
        btn.classList.toggle('active', !isVisible);
    }

    function selectFromMenu(p, c) { selectAlbum(p); changeTab(null, c); }

    function selectAlbum(name) {
        tocMenu.style.display = 'none';
        mainView.style.display = 'block';
        searchBar.style.display = 'none';
        document.getElementById('tab-wrapper').style.display = 'flex'; // 탭 노출
        menuToggle.querySelector('i').className = 'fas fa-bars';
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('display-album-name').innerText = name;
        currentAlbum = name;
        
        let tabs = ['전체'];
        const findMenu = menuStructure.find(m => m.name === name);
        if (findMenu) tabs = tabs.concat(findMenu.children);
        document.getElementById('tab-wrapper').innerHTML = tabs.map(t => `<button class="tab-btn" onclick="changeTab(this, '${t}')">${t}</button>`).join('');
        changeTab(null, '전체');
    }

    function changeTab(el, cat) {
        const buttons = document.querySelectorAll('.tab-btn');
        buttons.forEach(b => {
            if(b.innerText.trim() === cat.trim()) b.classList.add('active');
            else b.classList.remove('active');
        });

        currentTab = cat;
        currentVer = '전체';
        currentFsType = '전체';

        const vFilter = document.getElementById('version-filter');
        const fFilter = document.getElementById('fansign-filter');
        vFilter.style.display = 'none';
        fFilter.style.display = 'none';

        if (cat.includes('앨범')) {
            if (currentAlbum === 'The Chase' || currentAlbum === 'FOCUS') {
                vFilter.style.display = 'block';
                let vers = ['전체'];
                if (currentAlbum === 'The Chase') vers.push('Photobook Ver.', 'Package Ver.', 'Minibook Ver.');
                else if (currentAlbum === 'FOCUS') vers.push('Rule Book Ver.', 'PhotoBook Ver.', 'Heart Locket Ver.', 'SMini Ver.');
                document.getElementById('version-btn-wrapper').innerHTML = vers.map(v => `<button class="f-btn ${v==='전체'?'active':''}" onclick="setVersion(this, '${v}')">${v}</button>`).join('');
            }
        } else if (cat.includes('팬싸')) {
            if (currentAlbum === 'The Chase' || currentAlbum === 'FOCUS') {
                fFilter.style.display = 'block';
                document.getElementById('fansign-btn-wrapper').innerHTML = ['전체', '대면', '영통'].map(t => `<button class="f-btn ${t==='전체'?'active':''}" onclick="setFsType(this, '${t}')">${t}</button>`).join('');
            }
        }
        renderCards();
    }

    function setVersion(el, ver) {
        el.parentElement.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        currentVer = ver;
        renderCards();
    }

    function setFsType(el, type) {
        el.parentElement.querySelectorAll('.f-btn').forEach(b => b.classList.remove('active'));
        el.classList.add('active');
        currentFsType = type;
        renderCards();
    }

    function renderCards(keyword = '') {
        const filtered = pcData.filter(pc => {
            if (keyword !== '') {
                const searchTarget = keyword.toLowerCase();
                const nameMatch = pc.name.toLowerCase().includes(searchTarget);
                const infoMatch = pc.info ? pc.info.toLowerCase().includes(searchTarget) : false;
                return nameMatch || infoMatch;
            }
            
            const matchAlbum = currentAlbum === '전체' || pc.album === currentAlbum;
            const matchTab = currentTab === '전체' || pc.category === currentTab;
            const matchVer = currentVer === '전체' || pc.version === currentVer;
            const matchFs = currentFsType === '전체' || pc.fsType === currentFsType;
            return matchAlbum && matchTab && matchVer && matchFs;
        });

        document.getElementById('tab-label').innerText = keyword ? `"${keyword}" 결과: ${filtered.length}건` : `전체 ${filtered.length}개의 포토카드`;
        pcList.innerHTML = filtered.length > 0 ? filtered.map(pc => createCardHTML(pc)).join('') : `<div style="grid-column: span 2; padding: 100px 0; color:#bdc3c7; text-align:center; font-size:0.9rem;">데이터가 없습니다.</div>`;
    }

    function showBookmarks() {
        document.getElementById('welcome-view').style.display = 'none';
        document.getElementById('result-area').style.display = 'block';
        document.getElementById('display-album-name').innerText = "내 북마크";
        document.getElementById('tab-wrapper').innerHTML = ""; 
        document.getElementById('version-filter').style.display = 'none';
        document.getElementById('fansign-filter').style.display = 'none';
        searchBar.style.display = 'none';
        const bookmarkData = pcData.filter(pc => bookmarks.includes(pc.id));
        document.getElementById('tab-label').innerText = `${bookmarkData.length}개의 북마크한 포토카드`;
        pcList.innerHTML = bookmarkData.length > 0 ? bookmarkData.map(pc => createCardHTML(pc)).join('') : `<div style="grid-column: span 2; padding: 100px 0; color:#bdc3c7; text-align:center; font-size:0.9rem;">북마크가 없습니다.</div>`;
    }

    function createCardHTML(pc) {
        const isBookmarked = bookmarks.includes(pc.id);
        const imgTag = pc.imgUrl ? `<img src="${pc.imgUrl}" alt="${pc.name}" onclick="openModal('${pc.imgUrl}')">` : `<div style="width:100%; height:100%; display:flex; align-items:center; justify-content:center; color:#dfe6e9;"><i class="fas fa-image fa-2x"></i></div>`;
        return `
            <div class="card-item">
                <button class="card-bookmark-btn ${isBookmarked ? 'active' : ''}" onclick="toggleBookmark('${pc.id}')"><i class="${isBookmarked ? 'fas' : 'far'} fa-heart"></i></button>
                <div class="card-image-wrapper">${imgTag}</div>
                <div class="card-name">${pc.name}</div>
            </div>
        `;
    }

    function toggleBookmark(id) {
        const index = bookmarks.indexOf(id);
        if (index > -1) { bookmarks.splice(index, 1); } 
        else { bookmarks.push(id); }
        localStorage.setItem('jiwoo_bookmarks', JSON.stringify(bookmarks));
        if (document.getElementById('display-album-name').innerText === "내 북마크") showBookmarks();
        else renderCards(searchInput.value);
    }

    searchToggle.addEventListener('click', () => {
        const isVisible = searchBar.style.display === 'block';
        searchBar.style.display = isVisible ? 'none' : 'block';
        
        if (!isVisible) {
            searchInput.focus();
            searchInput.value = '';
            document.getElementById('welcome-view').style.display = 'none';
            document.getElementById('result-area').style.display = 'none';
        } else {
            goHome();
        }
    });

    searchInput.addEventListener('input', (e) => {
        const val = e.target.value;
        const tabWrapper = document.getElementById('tab-wrapper');
        if (val.trim() !== '') {
            document.getElementById('result-area').style.display = 'block';
            document.getElementById('display-album-name').innerText = "검색 결과";
            tabWrapper.style.display = 'none'; // 검색 시 탭 숨김
            renderCards(val);
        } else {
            document.getElementById('result-area').style.display = 'none';
            tabWrapper.style.display = 'flex'; // 지우면 다시 탭 표시
        }
    });

    function openModal(url) {
        const modal = document.getElementById('image-modal');
        const modalImg = document.getElementById('modal-img');
        modal.style.display = "flex";
        modalImg.src = url;
        document.body.style.overflow = "hidden";
    }

    function closeModal() {
        document.getElementById('image-modal').style.display = "none";
        document.body.style.overflow = "auto";
    }

    menuToggle.addEventListener('click', () => {
        if (tocMenu.style.display === 'block') {
            tocMenu.style.display = 'none'; mainView.style.display = 'block';
            menuToggle.querySelector('i').className = 'fas fa-bars';
        } else {
            tocMenu.style.display = 'block'; mainView.style.display = 'none';
            menuToggle.querySelector('i').className = 'fas fa-times';
        }
    });

    renderMenu();
</script>
